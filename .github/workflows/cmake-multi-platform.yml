name: Deepity Multi-Platform CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Define the different environments you want to test on
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libopenblas-dev liblapack-dev libomp-dev python3-dev pybind11-dev ninja-build

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install openblas libomp pybind11 ninja

    # The remaining steps are platform-independent thanks to your CMake setup!
    - name: Configure CMake
      run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Run benchmark
      run: |
        export OMP_NUM_THREADS=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        export OPENBLAS_NUM_THREADS=$OMP_NUM_THREADS
        ./build/bin/DeepityTests

    - name: Test
      working-directory: build
      run: ctest --output-on-failure
