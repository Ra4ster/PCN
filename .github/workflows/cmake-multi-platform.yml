name: Deepity Multi-Platform CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libopenblas-dev \
          liblapack-dev \
          libomp-dev \
          python3-dev \
          pybind11-dev \
          ninja-build

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install openblas libomp pybind11 ninja

    - name: Configure CMake
      run: |
        # If on macOS, tell CMake where Homebrew installed libomp
        if [ "$RUNNER_OS" == "macOS" ]; then
          export CMAKE_PREFIX_PATH="$(brew --prefix libomp):$CMAKE_PREFIX_PATH"
        fi
        
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      shell: bash

    - name: Build
      run: cmake --build build --config ${{env.BUILD_TYPE}}

    - name: Run benchmark
      run: |
        # Dynamically calculate CPU cores for both Linux (nproc) and macOS (sysctl)
        export OMP_NUM_THREADS=$(nproc 2>/dev/null || sysctl -n hw.ncpu)
        export OPENBLAS_NUM_THREADS=$OMP_NUM_THREADS
        export OMP_PROC_BIND=close
        export OMP_PLACES=cores
        
        ./build/bin/DeepityTests
      shell: bash

    - name: Test (CTest)
      working-directory: build
      run: ctest --output-on-failure